# See: https://github.com/DavidAnson/markdownlint

# Unordered list style
MD004:
  style: dash

# Line length — match Prettier's printWidth (120), disable for tables
MD013:
  line_length: 120
  tables: false

# Ordered list item prefix — allow 1./2./3. style so contributors don't have to
# rewrite every numbered list as 1./1./1.
MD029:
  style: ordered

# Spaces after list markers
MD030:
  ul_single: 1
  ol_single: 1
  ul_multi: 1
  ol_multi: 1

# Code block style
MD046:
  style: fenced
