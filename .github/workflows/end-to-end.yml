name: End-to-end (action PR)

# On every push to a PR, dogfoods the action against the real am-dependency
# and am-consumer repos:
#   1. format / lint / typecheck / test the PR
#   2. dispatch am-dependency end-to-end.yml (4 patch bumps on dev) and wait
#   3. dispatch am-consumer end-to-end.yml at the PR's HEAD SHA and wait
#   4. comment on the PR with links to the consumer auto-update PR for
#      manual visual review of the rendered body
#
# Concurrency is per-PR for cancel-in-progress (each push supersedes the
# previous run), and the downstream workflows have their own `end-to-end`
# group so cross-PR / manual triggers serialize at the resource boundary.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: end-to-end-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  e2e:
    # Skip fork PRs — they don't receive secrets, and we don't want to
    # publish on behalf of an unverified contributor anyway.
    #
    # Also skip Dependabot PRs — they run with the Dependabot secrets context,
    # which does NOT include Actions secrets like E2E_TOKEN. Mirroring the
    # token into Dependabot scope would expose it to any malicious dependency
    # update. Verify + check-dist + super-linter + CodeQL still gate the bump;
    # maintainers can run e2e manually post-merge if needed.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.E2E_TOKEN }}
      ACTION_PR_SHA: ${{ github.event.pull_request.head.sha }}
      ACTION_PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Dispatch am-dependency bump-burst
        id: burst
        run: |
          START=$(date -u +%s)
          gh workflow run end-to-end.yml -R washogren/am-dependency --ref dev
          # Find the run we just dispatched.
          for _ in $(seq 1 30); do
            RUN_ID=$(gh run list -R washogren/am-dependency \
              --workflow end-to-end.yml \
              --limit 5 \
              --json databaseId,createdAt,event \
              -q "[.[] | select(.event == \"workflow_dispatch\") | select((.createdAt | fromdateiso8601) >= $START)] | .[0].databaseId")
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "burst_run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
              echo "burst_run_url=https://github.com/washogren/am-dependency/actions/runs/$RUN_ID" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 2
          done
          if [ -z "${RUN_ID:-}" ] || [ "$RUN_ID" = "null" ]; then
            echo "could not locate dispatched bump-burst run" >&2
            exit 1
          fi
          echo "Dispatched: https://github.com/washogren/am-dependency/actions/runs/$RUN_ID"

      - name: Wait for am-dependency end-to-end to finish
        run: |
          gh run watch -R washogren/am-dependency ${{ steps.burst.outputs.burst_run_id }} --exit-status

      - name: Dispatch am-consumer end-to-end at PR SHA
        id: consumer
        run: |
          START=$(date -u +%s)
          gh workflow run end-to-end.yml -R washogren/am-consumer \
            --ref master \
            --field action-ref="$ACTION_PR_SHA"
          for _ in $(seq 1 30); do
            RUN_ID=$(gh run list -R washogren/am-consumer \
              --workflow end-to-end.yml \
              --limit 5 \
              --json databaseId,createdAt,event \
              -q "[.[] | select(.event == \"workflow_dispatch\") | select((.createdAt | fromdateiso8601) >= $START)] | .[0].databaseId")
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "consumer_run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
              echo "consumer_run_url=https://github.com/washogren/am-consumer/actions/runs/$RUN_ID" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 2
          done
          if [ -z "${RUN_ID:-}" ] || [ "$RUN_ID" = "null" ]; then
            echo "could not locate dispatched am-consumer run" >&2
            exit 1
          fi

      - name: Wait for am-consumer end-to-end to finish
        run: |
          gh run watch -R washogren/am-consumer ${{ steps.consumer.outputs.consumer_run_id }} --exit-status

      - name: Find consumer auto-update PR(s)
        id: consumer_pr
        run: |
          # The action opens / updates `auto-update/washogren-am-dependency-dev`.
          PR_JSON=$(gh pr list -R washogren/am-consumer \
            --state open \
            --head auto-update/washogren-am-dependency-dev \
            --json number,url,title \
            --limit 5)
          {
            echo "pr_json<<EOF"
            echo "$PR_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Merge consumer auto-update PR(s)
        # Merge BEFORE commenting so the link in the PR comment lands on a
        # merged PR whose body is frozen at this run's rendering. Merging
        # (rather than closing) advances `dev` exactly like the real cron flow
        # — the next run bumps from the just-merged state — and avoids the
        # closed-PR pile-up that accrued when each e2e run abandoned its PR.
        # --delete-branch cleans up the auto-update branch; peter-evans
        # recreates it on the next run.
        #
        # Gate the merge on the PR's own checks (am-consumer's test-pr.yml).
        # am-consumer is a private repo on a free plan, so branch protection
        # can't enforce required checks — this step enforces it instead. Opening
        # the PR triggers test-pr.yml asynchronously, so we `--watch` the PR's
        # checks to completion first; `--fail-fast` makes gh exit non-zero the
        # moment a check fails. A failing test skips the merge and fails this
        # step rather than merging a broken bump.
        env:
          PR_JSON: ${{ steps.consumer_pr.outputs.pr_json }}
          ACTION_PR_NUMBER: ${{ env.ACTION_PR_NUMBER }}
          ACTION_PR_SHA: ${{ env.ACTION_PR_SHA }}
        run: |
          failed=0
          # Read into an array so the loop body runs in this shell (not a pipe
          # subshell), letting a failure set `failed` and fail the step.
          mapfile -t PR_NUMBERS < <(echo "$PR_JSON" | jq -r '.[].number')
          for N in "${PR_NUMBERS[@]}"; do
            [ -z "$N" ] && continue
            # test-pr.yml registers its check asynchronously after the PR opens.
            # `gh pr checks --watch` errors instead of waiting when zero checks
            # exist yet, so poll until at least one shows up before watching.
            echo "Waiting for a check to register on am-consumer PR #$N..."
            for _ in $(seq 1 30); do
              if gh pr checks "$N" -R washogren/am-consumer >/dev/null 2>&1; then
                break
              fi
              sleep 4
            done
            echo "Watching checks on am-consumer PR #$N..."
            if ! gh pr checks "$N" -R washogren/am-consumer --watch --fail-fast; then
              echo "::error::am-consumer PR #$N has failing checks; refusing to merge it."
              gh pr comment "$N" -R washogren/am-consumer \
                --body "Not merged by auto-update-dependencies#${ACTION_PR_NUMBER} (action ref \`${ACTION_PR_SHA}\`): the PR's checks failed. Merge is gated on a green test run."
              failed=1
              continue
            fi
            gh pr comment "$N" -R washogren/am-consumer \
              --body "Merged by auto-update-dependencies#${ACTION_PR_NUMBER} (action ref \`${ACTION_PR_SHA}\`) as the historical e2e artifact. Merging advances \`dev\` like the real flow and keeps this PR's rendered body frozen."
            gh pr merge "$N" -R washogren/am-consumer --merge --delete-branch
          done
          exit "$failed"

      - name: Comment on the action PR
        env:
          PR_JSON: ${{ steps.consumer_pr.outputs.pr_json }}
          BURST_RUN_URL: ${{ steps.burst.outputs.burst_run_url }}
          CONSUMER_RUN_URL: ${{ steps.consumer.outputs.consumer_run_url }}
        run: |
          PR_LINKS=$(printf '%s' "$PR_JSON" | jq -r '.[] | "- [\(.title)](\(.url))"')
          if [ -z "$PR_LINKS" ]; then
            PR_LINKS="_(no open auto-update PR found on am-consumer — the run may have produced no diff)_"
          fi

          {
            echo "### End-to-end test results"
            echo
            echo "**Action ref tested:** \`$ACTION_PR_SHA\`"
            echo
            echo "- am-dependency bump-burst: [run]($BURST_RUN_URL)"
            echo "- am-consumer end-to-end: [run]($CONSUMER_RUN_URL)"
            echo
            echo "**Consumer PR(s) for manual review:**"
            echo
            echo "$PR_LINKS"
          } > comment.md

          gh pr comment "$ACTION_PR_NUMBER" -R "$GITHUB_REPOSITORY" --body-file comment.md
