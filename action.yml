name: 'Auto-update dependencies'
description:
  'Resolve an npm dist-tag, bump the consumer package.json, render a rich PR body (commits + grouped PRs from the
  dependency repo), and open a PR via peter-evans/create-pull-request.'
author: 'washogren'
inputs:
  package:
    description: 'The npm package name (e.g. @your-org/your-dependency).'
    required: true
  tag:
    description: 'The dist-tag to track (e.g. dev, staging, prod).'
    required: true
  base-branch:
    description: 'The branch to open the PR against. Defaults to the current ref (GITHUB_REF_NAME).'
    required: false
  npm-registry:
    description: 'The npm registry to read from. Defaults to https://npm.pkg.github.com.'
    required: false
    default: 'https://npm.pkg.github.com'
  npm-scope:
    description:
      'The npm scope to associate with the registry (e.g. @your-org). Required for scoped packages on GitHub Packages.'
    required: false
  node-version:
    description: 'Node.js version used to run npm install. Defaults to 20.'
    required: false
    default: '20'
  token:
    description:
      'Token used to read the npm registry, the dependency repository (for the changelog), and to open the PR. Typically
      a PAT with package:read on the registry, repo:read on the dependency repo, and repo:write on the consumer.'
    required: true
  delete-branch:
    description:
      'Whether to delete the auto-update branch when the PR is closed/merged. Forwarded to
      peter-evans/create-pull-request.'
    required: false
    default: 'true'
  auto-merge:
    description:
      'Enable GitHub auto-merge on the PR so it merges once required checks pass. Requires "Allow auto-merge" in repo
      settings and a branch protection rule / required status check to gate on.'
    required: false
    default: 'false'
  auto-merge-method:
    description: 'Merge method used when auto-merge is enabled: merge, squash, or rebase.'
    required: false
    default: 'squash'
  auto-merge-when-semver:
    description:
      'Restrict auto-merge to specific semver change types. A comma-separated list of major, minor, patch. When empty
      (the default), auto-merge applies to every bump without enforcing semver formatting. When set, both the pinned and
      resolved versions must be valid semver, and the PR only auto-merges if the change matches one of the listed types
      (prerelease-only bumps count as patch).'
    required: false
    default: ''
outputs:
  changed:
    description: 'true if the dist-tag points to a newer version than what is pinned in package.json; false otherwise.'
    value: ${{ steps.bump.outputs.changed }}
  current:
    description: 'The previously-pinned version (the value that was in package.json before the bump).'
    value: ${{ steps.bump.outputs.current }}
  latest:
    description: 'The version the dist-tag now points to.'
    value: ${{ steps.bump.outputs.latest }}
  pr-number:
    description: 'The number of the PR that was created or updated. Empty when no PR was opened.'
    value: ${{ steps.cpr.outputs.pull-request-number }}
  pr-url:
    description: 'The URL of the PR that was created or updated. Empty when no PR was opened.'
    value: ${{ steps.cpr.outputs.pull-request-url }}
  pr-operation:
    description: 'The operation peter-evans performed: created, updated, closed, or none. Empty when no PR was opened.'
    value: ${{ steps.cpr.outputs.pull-request-operation }}
runs:
  using: composite
  steps:
    - name: Set up Node.js for npm operations
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.npm-registry }}
        scope: ${{ inputs.npm-scope }}

    - name: Resolve dist-tag, bump package.json, render PR body
      id: bump
      shell: bash
      env:
        # core.getInput maps 'foo-bar' -> INPUT_FOO_BAR (uppercase, underscores).
        INPUT_PACKAGE: ${{ inputs.package }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}
        INPUT_NPM_REGISTRY: ${{ inputs.npm-registry }}
        INPUT_NPM_SCOPE: ${{ inputs.npm-scope }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_AUTO_MERGE: ${{ inputs.auto-merge }}
        INPUT_AUTO_MERGE_WHEN_SEMVER: ${{ inputs.auto-merge-when-semver }}
        NODE_AUTH_TOKEN: ${{ inputs.token }}
      run: node "${{ github.action_path }}/dist/index.js"

    - name: Open or update PR
      if: steps.bump.outputs.changed == 'true'
      id: cpr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ inputs.token }}
        base: ${{ inputs.base-branch || github.ref_name }}
        branch: ${{ steps.bump.outputs.pr-branch }}
        delete-branch: ${{ inputs.delete-branch }}
        title: ${{ steps.bump.outputs.pr-title }}
        commit-message: ${{ steps.bump.outputs.pr-commit-message }}
        body-path: ${{ steps.bump.outputs.pr-body-path }}

    - name: Enable auto-merge
      if: steps.cpr.outputs.pull-request-operation == 'created' && steps.bump.outputs.should-auto-merge == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        MERGE_METHOD: ${{ inputs.auto-merge-method }}
      run: |
        gh pr comment "$PR_NUMBER" --body \
          "🤖 Auto-merge enabled by \`auto-update-dependencies\` with the **${MERGE_METHOD}** method. This PR will merge automatically once all required status checks pass."
        gh pr merge "$PR_NUMBER" --auto --"$MERGE_METHOD"
